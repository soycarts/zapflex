# dbt-postgres against Supabase (session pooler, port 5432). Connection fields come
# from env vars derived from DATABASE_URL by run_dbt.py, so no secrets live here.
zapflex:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_PG_HOST') }}"
      port: "{{ env_var('DBT_PG_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_PG_USER') }}"
      password: "{{ env_var('DBT_PG_PASSWORD') }}"
      dbname: "{{ env_var('DBT_PG_DBNAME', 'postgres') }}"
      schema: "{{ env_var('DBT_PG_SCHEMA', 'public') }}"
      sslmode: require
      threads: 4
