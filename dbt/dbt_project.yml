name: zapflex
version: "1.0.0"
config-version: 2
profile: zapflex

model-paths: ["models"]
test-paths: ["tests"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Staging is kept light and ephemeral (no DB objects); only the four marts are
# materialised as tables in public so the dashboard and agents can poll them.
models:
  zapflex:
    staging:
      +materialized: ephemeral
    marts:
      +materialized: table
